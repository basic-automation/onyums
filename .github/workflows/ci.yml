# Continuous integration for the onyums workspace (ROADMAP Phase 0 — "Add CI").
#
# Scope note: every job here is offline. The live onion-service test
# (`live_service_serves_over_the_tor_network_and_shuts_down`) is `#[ignore]`d and is
# NOT run — it needs the real Tor network, takes minutes, and would make CI flaky on
# a network hiccup rather than on a code defect. It stays a local/manual tier
# (`cargo test -- --ignored`).

name: CI

on:
  push:
    branches: [master]
  pull_request:
  # Dependencies move under a frozen Cargo.lock; a weekly run catches a break that no
  # push would have surfaced.
  schedule:
    - cron: "0 5 * * 1"

# A new push to a PR makes the in-flight run obsolete. The arti stack is expensive to
# compile, so cancel rather than pay for a superseded answer.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Note: no global `RUSTFLAGS: -D warnings`. RUSTFLAGS applies to *dependencies* too,
  # so one warning in any of the ~200 crates in the arti tree — under a rustc release
  # nobody here chose — would fail CI for a reason no contributor can fix. The denial
  # belongs where it is enforceable: the clippy job below, which lints only workspace
  # members and denies rustc's own lints alongside clippy's.

jobs:
  test:
    name: test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-features
      # `--all-features` reaches onyums-skin's opt-in `equix` PoW backend, which is off
      # by default and would otherwise never be compiled or tested here.
      - name: Test
        run: cargo test --workspace --all-features
      # The keystore hardening in src/keystore_perms.rs is `#[cfg(unix)]`: its syscall
      # tests are inert on a Windows dev box, so this Linux runner is where they
      # actually execute against a real filesystem.
      - name: Test (keystore permissions, Unix path)
        run: cargo test -p onyums --lib keystore_perms -- --nocapture

  fmt:
    name: rustfmt (pinned nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The toolchain is PINNED, and that pin is the whole point of this job. rustfmt.toml
      # enables unstable options, so formatting needs nightly — and nightly rustfmt's output
      # drifts between releases. An unpinned `@nightly` would reformat the tree out from
      # under us on some random Tuesday and fail this job for reasons no contributor caused.
      # The pin is the same toolchain the tree was formatted with (2026-07-13); bumping it
      # means re-running `cargo +nightly-<date> fmt --all` in the same commit, never alone.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-13
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # The crates opt into clippy::pedantic/nursery/cargo in lib.rs; -D warnings makes
      # that opt-in binding rather than advisory.
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # The two crates have different floors on purpose: onyums is pinned by the
      # embedded arti 0.44 stack, while onyums-skin carries none of arti and stays two
      # minors lower. Checking them together at one version would silently let skin's
      # floor drift up to the server's. See the `rust-version` comments in each manifest.
      matrix:
        include:
          - crate: onyums
            rust: "1.91"
          - crate: onyums-skin
            rust: "1.89"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Check ${{ matrix.crate }} on ${{ matrix.rust }}
        run: cargo check -p ${{ matrix.crate }} --all-features --all-targets

  deny:
    name: cargo-deny (advisories, licences, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `-D unused-wrapper` is load-bearing, not tidiness. A ban entry whose crate has
      # been renamed upstream matches nothing and cargo-deny still reports `bans ok` —
      # the ban goes dead and the C dependency it guards sits in the graph unbanned.
      # That happened: the `lzma-sys`/`xz2` entry was silently dead after upstream
      # renamed them to `liblzma-sys`/`liblzma` (fixed 2026-07-20), and the only signal
      # was a warning. Promoting it to an error means a rename fails CI instead of
      # quietly disarming the no-FFI guard.
      #
      # Deliberately NOT also `-D advisory-not-detected`: that one fires legitimately
      # here, because the RUSTSEC-2026-0173 ignore is needed for the all-features graph
      # and is genuinely not encountered on the default one. Denying it would fail CI
      # for a correct config.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: -D unused-wrapper
      # The second run is not redundant with the first. The default graph carries no
      # copyleft (onyums-skin's LGPL `equix` backend is opt-in), which is precisely what
      # `cargo deny check` above enforces. This run turns `equix` on and checks it under
      # the same policy, where LGPL-3.0-only is allowed for exactly two named crates.
      # `--workspace` is load-bearing: without it cargo-deny resolves from the root
      # package, whose `--all-features` does not reach a member's optional feature, and
      # the run would pass for the wrong reason.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace --all-features -D unused-wrapper

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Docs must build *warning-free*. This catches a doc example or intra-doc link that
      # stops compiling, and — since 2026-07-17, when the last of the rustdoc warnings were
      # cleared out of onyums-skin — a broken or private-target intra-doc link too. The
      # deny is the point: rustdoc warnings are invisible in normal work (nobody reads
      # `cargo doc` output), so without a gate they silently accumulate, which is exactly
      # how the tree reached 46 of them. Verified locally at zero across the workspace
      # before this was tightened.
      - name: Build docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --workspace --all-features
