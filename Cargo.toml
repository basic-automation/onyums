[package]
name = "onyums"
version = "0.2.4"
edition = "2024"
license = "MIT"
repository = "https://github.com/basic-automation/onyums"
readme = "README.md"
description = "An Onion-service server using axum."
keywords = ["tor", "http", "request", "server", "SOCKS"]
categories = ["network-programming", "web-programming::http-client"]

[dependencies]
anyhow = "1.0.100"
hyper = { version = "1.8.1", features = ["full"] }
hyper-util = { version = "0.1.19", features = ["full"] }
futures = "0.3.31"
arti-client = { version = "0.38.0", features = ["full", "static"] }
tor-cell = { version = "0.38.0", features = ["full"] }
tor-hsservice = { version = "0.38.0", features = ["full"] }
tor-proto = { version = "0.38.0", features = ["full", "stream-ctrl"] }
tor-rtcompat = { version = "0.38.0", features = ["full"] }
tor-cert = "0.38.0"
tokio = { version = "1.49.0", features = ["full"] }
axum = { version = "0.8.8", features = ["http2"] }
tower-service = "0.3.3"
tracing = "0.1.44"
rcgen = "0.14.7"
tokio-rustls = { version = "0.26.4", default-features = false, features = ["logging", "tls12", "ring"] }
http-body-util = "0.1.3"
bytes = "1.11.0"
safelog = "0.7.1"

[dev-dependencies]
tracing-subscriber = "0.3.22"
